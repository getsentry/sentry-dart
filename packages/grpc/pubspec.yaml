name: sentry_grpc
description: An integration which adds support for performance tracing and error monitoring for gRPC calls.
version: 9.20.0
homepage: https://docs.sentry.io/platforms/dart/
repository: https://github.com/getsentry/sentry-dart
issue_tracker: https://github.com/getsentry/sentry-dart/issues
documentation: https://docs.sentry.io/platforms/dart/integrations/grpc/

environment:
  sdk: '>=3.5.0 <4.0.0'

platforms:
  android:
  ios:
  macos:
  linux:
  windows:
  web:

dependencies:
  grpc: '>=4.0.4 <6.0.0'
  sentry: 9.20.0

dev_dependencies:
  _sentry_testing:
    path: ../_sentry_testing
  fixnum: ^1.1.0
  lints: '>=2.0.0'
  protobuf: ^6.0.0
  test: ^1.21.1
  yaml: ^3.1.0
  coverage: ^1.3.0
