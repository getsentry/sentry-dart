name: Dart tests
description: Run Dart tests
inputs:
  directory:
    description: The directory to run tests in
    required: false
    default: ''
  web:
    description: Whether to run tests for web
    required: false
    default: 'true'

runs:
  using: composite

  steps:
    - uses: dart-lang/setup-dart@f0ead981b4d9a35b37f30d36160575d60931ec30 # pin@v1
      with:
        sdk: ${{ matrix.sdk }}

    - run: dart pub get
      shell: bash
      working-directory: ${{ inputs.directory }}

    - name: Test VM
      working-directory: ${{ inputs.directory }}
      shell: bash
      run: |
        testCmd="dart test -p vm --test-randomize-ordering-seed=random --chain-stack-traces"
        if [ "${{ matrix.sdk }}" = "stable" ]; then
          $testCmd --coverage=coverage --file-reporter json:test-vm.jsonl
          dart run coverage:format_coverage --lcov --in=coverage --out=coverage/lcov.info --packages=.dart_tool/package_config.json --report-on=lib
        else
          $testCmd --file-reporter json:test-vm.jsonl
        fi

    - name: Test dart2js
      if: ${{ inputs.web == 'true' }}
      run: dart test -p chrome --test-randomize-ordering-seed=random --chain-stack-traces
      shell: bash
      working-directory: ${{ inputs.directory }}

    - name: Test dart2wasm
      if: ${{ inputs.web == 'true' && (matrix.sdk == 'stable' || matrix.sdk == 'beta') && runner.os != 'Windows' }}
      run: dart test -p chrome --compiler dart2wasm --test-randomize-ordering-seed=random --chain-stack-traces
      shell: bash
      working-directory: ${{ inputs.directory }}

    - uses: subosito/flutter-action@f2c4f6686ca8e8d6e6d0f28410eeef506ed66aff # pin@v2.18.0
      if: ${{ !cancelled() && !startsWith(matrix.sdk, '3.5') }}
      with:
        channel: ${{ matrix.sdk }}

    - name: Install flutter_junitreport
      if: ${{ !cancelled() && !startsWith(matrix.sdk, '3.5') }}
      shell: bash
      run: |
        tool_dir="$RUNNER_TEMP/flutter_junitreport"
        rm -rf "$tool_dir"
        mkdir -p "$tool_dir"
        cat > "$tool_dir/pubspec.yaml" <<'YAML'
        name: sentry_flutter_junitreport
        publish_to: none

        environment:
          sdk: "^3.12.0"
          flutter: ">=3.44.0"

        dependencies:
          flutter_junitreport:
            git:
              url: https://github.com/waffiqaziz/flutter-junitreport.git
              ref: main
        YAML
        cd "$tool_dir"
        flutter pub get

    - name: Convert test results to JUnit XML
      if: ${{ !cancelled() && !startsWith(matrix.sdk, '3.5') }}
      working-directory: ${{ inputs.directory }}
      shell: bash
      run: |
        input_file="$PWD/test-vm.jsonl"
        output_file="$PWD/TEST-vm-junit.xml"
        cd "$RUNNER_TEMP/flutter_junitreport"
        flutter pub run flutter_junitreport:tojunit --input "$input_file" --output "$output_file"
