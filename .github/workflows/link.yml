name: sentry-link
on:
  push:
    branches:
      - main
      - release/**
  pull_request:
    paths:
      - '!**/*.md'
      - '!**/class-diagram.svg'
      - '.github/workflows/link.yml'
      - '.github/workflows/package-analysis.yml'
      - '.github/actions/dart-test/**'
      - '.github/actions/coverage/**'
      - '.github/actions/test-results/**'
      - 'packages/dart/**'
      - 'packages/link/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    name: '${{ matrix.os }} | ${{ matrix.sdk }}'
    runs-on: ${{ matrix.os }}-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [macos, ubuntu, windows]
        sdk: [stable, beta]

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: ./.github/actions/dart-test
        with:
          directory: packages/link
          web: false

      - uses: ./.github/actions/coverage
        if: runner.os == 'Linux' && matrix.sdk == 'stable'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: packages/link
          coverage: sentry_link
          min-coverage: 3

      - uses: ./.github/actions/test-results
        if: ${{ !cancelled() }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: sentry_link-${{ runner.os }}-${{ matrix.sdk }}

  package-analysis:
    uses: ./.github/workflows/package-analysis.yml
    with:
      package: packages/link
