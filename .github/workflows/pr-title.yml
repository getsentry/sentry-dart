name: "PR Title"
on:
  pull_request:
    types: [opened, edited, reopened, ready_for_review, labeled, unlabeled]
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  check:
    name: Check PR title
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            if (context.payload.pull_request) {
              const prTitle = require('./.github/actions/pr-title/index.js')
              await prTitle({github, context, core})
            }
