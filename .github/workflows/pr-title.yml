name: 'PR Title'
on:
  pull_request:
    types:
      [
        opened,
        synchronize,
        edited,
        reopened,
        ready_for_review,
        labeled,
        unlabeled,
      ]
  merge_group:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  check:
    name: Check Conventional PR Title
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v8
        with:
          script: |
            const TITLE_RE = /^(ci|build|docs|feat|fix|perf|ref|refactor|impr|enh|deps|style|chore|tests?|meta)(\([^)]+\))?!?: [A-Za-z`'"].*[^,.]$/;

            function isRevert(title) {
              return /^Revert ".*"$/.test(title || '');
            }

            function validateTitle(pr) {
              if (pr.merged || pr.draft) {
                return null;
              }

              if (TITLE_RE.test(pr.title || '') || isRevert(pr.title)) {
                return null;
              }

              return `#${pr.number}: "${pr.title}"`;
            }

            async function getMergeGroupPrs() {
              const headSha = context.payload.merge_group?.head_sha;
              if (!headSha) {
                core.setFailed('merge_group payload does not include merge_group.head_sha.');
                return [];
              }

              return github.paginate(github.rest.repos.listPullRequestsAssociatedWithCommit, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: headSha,
              });
            }

            let prs = [];
            if (context.payload.pull_request) {
              prs = [context.payload.pull_request];
            } else if (context.eventName === 'merge_group') {
              prs = await getMergeGroupPrs();
              if (prs.length === 0) {
                core.setFailed(
                  'No pull requests are associated with this merge_group head SHA.'
                );
              }
            } else {
              core.setFailed(`Unsupported event: ${context.eventName}`);
            }

            const failures = prs.map(validateTitle).filter(Boolean);
            if (failures.length > 0) {
              core.setFailed(
                `PR title does not match Sentry conventions:\n${failures.join('\n')}`
              );
              core.info(
                'Please follow the Sentry commit message conventions: https://develop.sentry.dev/engineering-practices/commit-messages/'
              );
              core.info('Format: <type>(<scope>): <subject>');
              core.info('Subject line must not end with a period.');
            } else if (prs.length > 0) {
              core.info(`Validated ${prs.length} PR title(s).`);
            }
