name: sentry-grpc
on:
  push:
    branches:
      - main
      - release/**
  pull_request:
    paths:
      - '!**/*.md'
      - '!**/class-diagram.svg'
      - '.github/workflows/grpc.yml'
      - '.github/workflows/package-analysis.yml'
      - '.github/actions/dart-test/**'
      - '.github/actions/coverage/**'
      - '.github/actions/test-results/**'
      - 'packages/dart/**'
      - 'packages/grpc/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    name: '${{ matrix.os }} | ${{ matrix.sdk }}'
    runs-on: ${{ matrix.os }}-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [macos, ubuntu, windows]
        sdk: [stable, beta]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/dart-test
        with:
          directory: packages/grpc
          web: true

      - uses: ./.github/actions/coverage
        if: runner.os == 'Linux' && matrix.sdk == 'stable'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: packages/grpc
          coverage: sentry_grpc
          min-coverage: 90

      - uses: ./.github/actions/test-results
        if: ${{ !cancelled() }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: sentry_grpc-${{ runner.os }}-${{ matrix.sdk }}

  package-analysis:
    uses: ./.github/workflows/package-analysis.yml
    with:
      package: packages/grpc
