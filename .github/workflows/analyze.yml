on:
  workflow_call:
    inputs:
      package:
        required: true
        type: string
      sdk:
        required: false
        type: string
        default: dart
      panaThreshold:
        description: Minimum number of points that must be achieved.
        required: false
        type: number
        default: 140

jobs:
  analyze:
    if: ${{ !startsWith(github.ref, 'refs/heads/release/') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ${{ inputs.package }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # pin@v1.7.2
        if: ${{ inputs.sdk == 'dart' }}
      - uses: subosito/flutter-action@fd55f4c5af5b953cc57a2be44cb082c8f6635e8e # pin@v2.21.0
        if: ${{ inputs.sdk == 'flutter' }}

      - run: dart pub get
        if: ${{ inputs.sdk == 'dart' }}

      - run: flutter pub get
        if: ${{ inputs.sdk == 'flutter' }}

      - run: flutter pub get
        if: ${{ inputs.package == 'flutter' }}
        working-directory: packages/flutter/microbenchmarks

      - run: dart format --set-exit-if-changed ./

      - name: dart analyze
        uses: invertase/github-action-dart-analyzer@e981b01a458d0bab71ee5da182e5b26687b7101b # pin@v3.0.0
        with:
          annotate: true
          fatal-infos: true
          fatal-warnings: true
          annotate-only: false
          working-directory: ${{ inputs.package }}

      - run: dart doc --dry-run

  package-analysis:
    # We run `pana` directly instead of the `axel-op/dart-package-analyzer`
    # action because that action's bundled Flutter SDK is frozen at 3.38.6 and
    # cannot resolve packages that require a newer Flutter (e.g. sentry_flutter
    # on 3.44+). Setting up the SDK ourselves lets pana use a current Flutter.
    if: ${{ !startsWith(github.ref, 'refs/heads/release/') && inputs.panaThreshold > 0 }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ${{ inputs.package }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # pin@v1.7.2
        if: ${{ inputs.sdk == 'dart' }}
      - uses: subosito/flutter-action@fd55f4c5af5b953cc57a2be44cb082c8f6635e8e # pin@v2.21.0
        if: ${{ inputs.sdk == 'flutter' }}
        with:
          channel: stable
      # pana runs its own dependency resolution in a temporary copy, which
      # ignores `dependency_overrides`. Pin the in-repo `sentry` package via an
      # absolute path so the not-yet-published version resolves.
      - name: Apply dependency override
        if: ${{ inputs.package != 'packages/dart' }}
        run: |
          sed -i.bak 's|sentry:.*|sentry:\n    path: ${{ github.workspace }}/packages/dart|g' pubspec.yaml
      - name: Run pana
        id: analysis
        run: |
          dart pub global activate pana
          dart pub global run pana --no-warning --json > "$RUNNER_TEMP/pana.json"
          echo "total=$(jq -r '.scores.grantedPoints // 0' "$RUNNER_TEMP/pana.json")" >> "$GITHUB_OUTPUT"
          echo "total_max=$(jq -r '.scores.maxPoints // 0' "$RUNNER_TEMP/pana.json")" >> "$GITHUB_OUTPUT"
      - name: Check scores
        env:
          TOTAL: ${{ steps.analysis.outputs.total }}
          TOTAL_MAX: ${{ steps.analysis.outputs.total_max }}
          PANA_THRESHOLD: ${{ inputs.panaThreshold }}
        run: |
          if (( TOTAL < PANA_THRESHOLD )); then
            echo "Pana score check failed: ${TOTAL}/${TOTAL_MAX} points (minimum required: ${PANA_THRESHOLD})."
            exit 1
          else
            echo "Pana score check passed: ${TOTAL}/${TOTAL_MAX} points (minimum required: ${PANA_THRESHOLD})."
          fi
