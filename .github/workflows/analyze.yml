name: Analyze

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  packages:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: dart
            package: packages/dart
            sdk: dart
          - name: dio
            package: packages/dio
            sdk: dart
          - name: drift
            package: packages/drift
            sdk: dart
          - name: e2e-dart
            package: e2e_test
            sdk: dart
          - name: file
            package: packages/file
            sdk: dart
          - name: firebase-remote-config
            package: packages/firebase_remote_config
            sdk: flutter
          - name: flutter
            package: packages/flutter
            sdk: flutter
          - name: grpc
            package: packages/grpc
            sdk: dart
          - name: hive
            package: packages/hive
            sdk: dart
          - name: isar
            package: packages/isar
            sdk: flutter
          - name: link
            package: packages/link
            sdk: dart
          - name: logging
            package: packages/logging
            sdk: dart
          - name: sqflite
            package: packages/sqflite
            sdk: flutter
          - name: supabase
            package: packages/supabase
            sdk: flutter
    uses: ./.github/workflows/analyze-package.yml
    with:
      package: ${{ matrix.package }}
      sdk: ${{ matrix.sdk }}

  required:
    # Preserve the existing ruleset context while analysis moves into this workflow.
    name: analyze / analyze
    if: ${{ always() }}
    needs: packages
    runs-on: ubuntu-latest
    steps:
      - name: Verify package analysis
        env:
          RESULT: ${{ needs.packages.result }}
        run: |
          if [[ "$RESULT" != "success" ]]; then
            echo "Package analysis result: $RESULT"
            exit 1
          fi
