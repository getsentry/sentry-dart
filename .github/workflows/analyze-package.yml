on:
  workflow_call:
    inputs:
      package:
        required: true
        type: string
      sdk:
        required: false
        type: string
        default: dart

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ${{ inputs.package }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # pin@v1.7.2
        if: ${{ inputs.sdk == 'dart' }}
      - uses: subosito/flutter-action@fd55f4c5af5b953cc57a2be44cb082c8f6635e8e # pin@v2.21.0
        if: ${{ inputs.sdk == 'flutter' }}

      - run: dart pub get
        if: ${{ inputs.sdk == 'dart' }}

      - run: flutter pub get
        if: ${{ inputs.sdk == 'flutter' }}

      - run: flutter pub get
        if: ${{ inputs.package == 'flutter' }}
        working-directory: packages/flutter/microbenchmarks

      - run: dart format --set-exit-if-changed ./

      - name: dart analyze
        uses: invertase/github-action-dart-analyzer@e981b01a458d0bab71ee5da182e5b26687b7101b # pin@v3.0.0
        with:
          annotate: true
          fatal-infos: true
          fatal-warnings: true
          annotate-only: false
          working-directory: ${{ inputs.package }}

      - run: dart doc --dry-run
